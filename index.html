<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lua for Game Designers — Course Index</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root {
  --bg: #0f0f14;
  --surface: #17171f;
  --surface2: #1e1e2a;
  --border: #2a2a38;
  --accent: #e8c547;
  --accent2: #7b6cff;
  --accent3: #4ecdc4;
  --text: #e8e8f0;
  --text-dim: #888899;
  --code-bg: #12121a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ─────────────────────────────────────────── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 28px 48px 24px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}

.header-left {}

.course-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
}

h1 {
  font-size: 1.8rem;
  font-weight: 800;
  line-height: 1.1;
  color: var(--text);
}

.header-meta {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  align-items: center;
}

.meta-item {
  font-size: 0.82rem;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 6px;
}

.meta-item span { color: var(--accent); }

/* ── PROGRESS SUMMARY ───────────────────────────────── */
#progress-summary {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 20px 48px;
  display: flex;
  align-items: center;
  gap: 32px;
  flex-wrap: wrap;
}

.progress-label {
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  flex-shrink: 0;
}

.progress-track {
  flex: 1;
  min-width: 200px;
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.5s ease;
  box-shadow: 0 0 8px var(--accent);
}

.progress-stats {
  display: flex;
  gap: 20px;
  flex-shrink: 0;
}

.stat {
  text-align: center;
}

.stat-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--accent);
  display: block;
  line-height: 1;
}

.stat-label {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-top: 4px;
  display: block;
}

/* ── MAIN CONTENT ───────────────────────────────────── */
main {
  flex: 1;
  padding: 40px 48px;
  max-width: 1100px;
  width: 100%;
  margin: 0 auto;
}

.section-heading {
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

/* ── SESSION CARDS ──────────────────────────────────── */
.session-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
  gap: 16px;
  margin-bottom: 48px;
}

.session-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.2s;
  position: relative;
}

.session-card:hover {
  border-color: var(--accent);
}

.session-card.complete {
  border-left: 3px solid var(--accent3);
}

.session-card.in-progress {
  border-left: 3px solid var(--accent);
}

.session-card.locked {
  opacity: 0.5;
}

.card-header {
  padding: 18px 20px 14px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
}

.session-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--accent);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 8px;
  flex-shrink: 0;
  margin-top: 2px;
}

.card-title-block { flex: 1; }

.card-session-label {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.card-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.25;
}

.card-status {
  flex-shrink: 0;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 3px;
  border: 1px solid var(--border);
  color: var(--text-dim);
}

.card-status.complete {
  background: rgba(78, 205, 196, 0.1);
  border-color: var(--accent3);
  color: var(--accent3);
}

.card-status.in-progress {
  background: rgba(232, 197, 71, 0.1);
  border-color: var(--accent);
  color: var(--accent);
}

.card-topics {
  padding: 0 20px 14px 54px;
  font-size: 0.8rem;
  color: var(--text-dim);
  line-height: 1.6;
}

.card-divider {
  height: 1px;
  background: var(--border);
  margin: 0 20px;
}

.card-actions {
  padding: 14px 20px;
  display: flex;
  gap: 10px;
  align-items: center;
}

.btn-deck {
  flex: 1;
  display: block;
  background: var(--accent);
  color: var(--bg);
  text-decoration: none;
  font-family: 'Syne', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  padding: 9px 16px;
  border-radius: 4px;
  text-align: center;
  transition: opacity 0.2s;
  letter-spacing: 0.04em;
}

.btn-deck:hover { opacity: 0.85; }

.btn-worksheet {
  display: block;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  text-decoration: none;
  font-family: 'Syne', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  padding: 9px 16px;
  border-radius: 4px;
  text-align: center;
  transition: all 0.2s;
  white-space: nowrap;
  letter-spacing: 0.04em;
}

.btn-worksheet:hover {
  border-color: var(--accent2);
  color: var(--accent2);
}

.btn-mark {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: 'Syne', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  padding: 9px 12px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  flex-shrink: 0;
}

.btn-mark:hover {
  border-color: var(--accent3);
  color: var(--accent3);
}

.session-card.complete .btn-mark {
  border-color: var(--accent3);
  color: var(--accent3);
}

/* ── LOCKED OVERLAY ─────────────────────────────────── */
.locked-msg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(15,15,20,0.6);
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}

/* ── FOOTER ─────────────────────────────────────────── */
footer {
  border-top: 1px solid var(--border);
  padding: 16px 48px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}

.footer-note {
  font-size: 0.75rem;
  color: var(--text-dim);
}

.btn-reset {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: 'Syne', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-reset:hover {
  border-color: #ff6b6b;
  color: #ff6b6b;
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="course-label">MMO Game Design — Scripting Fundamentals</div>
    <h1>Lua for Game Designers</h1>
  </div>
  <div class="header-meta">
    <div class="meta-item"><span>📚</span> 8 Sessions</div>
    <div class="meta-item"><span>⏱</span> ~6 hours total</div>
    <div class="meta-item"><span>📄</span> Worksheets included</div>
  </div>
</header>

<div id="progress-summary">
  <div class="progress-label">Overall Progress</div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="progress-stats">
    <div class="stat">
      <span class="stat-num" id="stat-complete">0</span>
      <span class="stat-label">Complete</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="stat-remaining">8</span>
      <span class="stat-label">Remaining</span>
    </div>
  </div>
</div>

<main>
  <div class="section-heading">Course Sessions</div>
  <div class="session-grid" id="session-grid"></div>
</main>

<footer>
  <div class="footer-note">Progress is saved in your browser. Files must be served from the same folder to work correctly.</div>
  <button class="btn-reset" onclick="resetProgress()">Reset Progress</button>
</footer>

<script>
const SESSIONS = [
  {
    num: 1,
    title: "Variables &amp; Data Types",
    topics: "What a variable is · number, string, boolean, nil · local vs. global · naming conventions",
    deck: "decks/session1-deck.html",
    worksheet: "worksheets/session1-worksheet.html"
  },
  {
    num: 2,
    title: "Operators &amp; Expressions",
    topics: "Arithmetic · comparison operators · logical operators (and/or/not) · string concatenation · precedence",
    deck: "decks/session2-deck.html",
    worksheet: "worksheets/session2-worksheet.html"
  },
  {
    num: 3,
    title: "Conditional Logic",
    topics: "if / then / end · else · elseif · order of conditions · nested conditionals · boolean shortcuts",
    deck: "decks/session3-deck.html",
    worksheet: "worksheets/session3-worksheet.html"
  },
  {
    num: 4,
    title: "Loops",
    topics: "for loops · while loops · repeat / until · step values · infinite loop trap · loops with conditionals",
    deck: "decks/session4-deck.html",
    worksheet: "worksheets/session4-worksheet.html"
  },
  {
    num: 5,
    title: "Functions",
    topics: "Defining and calling · parameters · return values · scope · multiple return values",
    deck: "decks/session5-deck.html",
    worksheet: "worksheets/session5-worksheet.html"
  },
  {
    num: 6,
    title: "Reading External Data",
    topics: "Data objects from the engine · dot notation · multiple objects · defensive reads · nil fallbacks",
    deck: "decks/session6-deck.html",
    worksheet: "worksheets/session6-worksheet.html"
  },
  {
    num: 7,
    title: "Tables as Arrays",
    topics: "Ordered lists · index access · # length operator · table.insert · table.remove · ipairs",
    deck: "decks/session7-deck.html",
    worksheet: "worksheets/session7-worksheet.html"
  },
  {
    num: 8,
    title: "Dictionary Tables",
    topics: "key = value pairs · dot &amp; bracket notation · adding/removing properties · pairs · nested tables · self-managing tables",
    deck: "decks/session8-deck.html",
    worksheet: "worksheets/session8-worksheet.html"
  }
];

const STORAGE_KEY = 'lua_course_progress';

function loadProgress() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch(e) {
    return {};
  }
}

function saveProgress(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function getStatus(progress, num) {
  return progress[num] || 'not-started';
}

function toggleComplete(num) {
  const progress = loadProgress();
  progress[num] = (progress[num] === 'complete') ? 'not-started' : 'complete';
  saveProgress(progress);
  render();
}

function resetProgress() {
  if (confirm('Reset all progress? This cannot be undone.')) {
    localStorage.removeItem(STORAGE_KEY);
    render();
  }
}

function render() {
  const progress = loadProgress();
  const grid = document.getElementById('session-grid');
  grid.innerHTML = '';

  let completeCount = 0;

  SESSIONS.forEach(session => {
    const status = getStatus(progress, session.num);
    if (status === 'complete') completeCount++;

    const isComplete = status === 'complete';
    const cardClass = isComplete ? 'complete' : '';
    const statusLabel = isComplete ? 'Complete' : 'Not Started';
    const statusClass = isComplete ? 'complete' : '';
    const markLabel = isComplete ? '✓ Done' : 'Mark Done';

    const card = document.createElement('div');
    card.className = `session-card ${cardClass}`;
    card.innerHTML = `
      <div class="card-header">
        <div class="session-num">S${String(session.num).padStart(2,'0')}</div>
        <div class="card-title-block">
          <div class="card-session-label">Session ${session.num} of 8</div>
          <div class="card-title">${session.title}</div>
        </div>
        <div class="card-status ${statusClass}">${statusLabel}</div>
      </div>
      <div class="card-topics">${session.topics}</div>
      <div class="card-divider"></div>
      <div class="card-actions">
        <a class="btn-deck" href="${session.deck}">Open Deck →</a>
        <a class="btn-worksheet" href="${session.worksheet}">Worksheet</a>
        <button class="btn-mark" onclick="toggleComplete(${session.num})">${markLabel}</button>
      </div>
    `;

    grid.appendChild(card);
  });

  // Update progress bar and stats
  const pct = Math.round((completeCount / SESSIONS.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('stat-complete').textContent = completeCount;
  document.getElementById('stat-remaining').textContent = SESSIONS.length - completeCount;
}

render();
</script>
</body>
</html>
